<!doctype html>
<html>
<head>
  <title>{% block title %}Prior auth prep{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="navbar">
    <span class="brand">Prior auth prep</span>
    <a href="{{ url_for('cases.queue') }}" class="{{ 'active' if request.path == '/' else '' }}">Queue</a>
  </div>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
