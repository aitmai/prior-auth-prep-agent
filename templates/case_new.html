{% extends "base.html" %}
{% block title %}New case — Prior auth prep{% endblock %}
{% block content %}

<a class="back-link" href="{{ url_for('cases.queue') }}">&larr; Back to queue</a>

<h1 style="font-size:18px;margin:0 0 16px;">New case</h1>

<form method="post" class="card">
  <div class="form-row">
    <label>Patient name</label>
    <input type="text" name="patient_name" required>
  </div>
  <div class="form-row">
    <label>Patient age</label>
    <input type="number" name="patient_age" min="0" max="130">
  </div>
  <div class="form-row">
    <label>Service description</label>
    <input type="text" name="service_description" required placeholder="e.g. MRI lumbar spine">
  </div>
  <div class="form-row">
    <label>Procedure code (CPT/HCPCS)</label>
    <input type="text" name="procedure_code">
  </div>
  <div class="form-row">
    <label>Diagnosis code (ICD-10)</label>
    <input type="text" name="diagnosis_code">
  </div>
  <div class="form-row">
    <label>Service category</label>
    <input type="text" name="service_category" list="categories"
           placeholder="must match a payer's policy category to pass policy check">
    <datalist id="categories">
      {% for k in known %}
      <option value="{{ k.service_category }}">{{ k.payer_name }} — {{ k.service_category }}</option>
      {% endfor %}
    </datalist>
  </div>
  <div class="form-row">
    <label>Payer</label>
    <input type="text" name="payer_name" required list="payers">
    <datalist id="payers">
      {% for k in known %}
      <option value="{{ k.payer_name }}">
      {% endfor %}
    </datalist>
  </div>
  <div class="form-row">
    <label>Appointment date</label>
    <input type="date" name="appointment_date">
  </div>
  <div class="form-row">
    <label>Urgency</label>
    <select name="urgency_tier">
      <option value="routine">Routine</option>
      <option value="urgent">Urgent</option>
    </select>
  </div>
  <div class="form-row">
    <label>Chart note / referral text</label>
    <textarea class="draft" name="chart_note_text" style="height:140px;"
              placeholder="Paste the intake note the extraction agent should read"></textarea>
  </div>
  <div class="actions">
    <button type="submit" class="btn-primary" style="width:100%;">Create case</button>
  </div>
</form>
{% endblock %}
